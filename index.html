<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plastic Waste Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <style>
        :root {
            --primary: #2ecc71;
            --danger: #ff4757;
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 350px;
            position: relative;
        }

        #alert-box {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--danger);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            z-index: 100;
            box-shadow: 0 0 30px rgba(255, 71, 87, 1);
            animation: blink 0.5s infinite;
            pointer-events: none;
        }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.6} 100% {opacity:1} }

        #webcam-container {
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid var(--primary);
            background: #000;
            line-height: 0;
        }

        button {
            background: var(--primary);
            border: none;
            padding: 12px;
            color: white;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        .bar-outer { background: rgba(255,255,255,0.1); height: 14px; border-radius: 7px; overflow: hidden; }
        .bar-inner { height: 100%; transition: width 0.3s ease-out; background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="alert-box">⚠️ PLASTIC DETECTED!</div>
    <h1>♻️ Waste Detector</h1>
    <button type="button" id="start-btn" onclick="init()">Start Detector</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/yGxyYnamy/";
    let model, webcam, labelContainer, maxPredictions;
    
    // Smoothing setup: average the last 10 predictions
    let predictionHistory = [];
    const historyLimit = 10; 

    async function init() {
        const btn = document.getElementById("start-btn");
        btn.innerText = "Connecting...";

        try {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();

            btn.style.display = "none";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");

            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.style.marginBottom = "15px";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:5px">
                        <span>${model.getClassLabels()[i]}</span>
                        <span class="prob-text">0%</span>
                    </div>
                    <div class="bar-outer"><div class="bar-inner" id="bar-${i}" style="width:0%"></div></div>
                `;
                labelContainer.appendChild(div);
            }
            window.requestAnimationFrame(loop);
        } catch (e) {
            btn.innerText = "Error Loading Model";
            console.error(e);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        // Add current prediction to history
        predictionHistory.push(prediction);
        if (predictionHistory.length > historyLimit) {
            predictionHistory.shift();
        }

        // Calculate averages for each class
        const averages = prediction.map((p, i) => {
            const sum = predictionHistory.reduce((acc, current) => acc + current[i].probability, 0);
            return sum / predictionHistory.length;
        });

        const alertBox = document.getElementById("alert-box");
        let isDanger = false;

        for (let i = 0; i < maxPredictions; i++) {
            const name = prediction[i].className;
            const avgProb = averages[i];
            const probPercent = (avgProb * 100).toFixed(0);
            
            const row = labelContainer.childNodes[i];
            const bar = document.getElementById(`bar-${i}`);
            
            row.querySelector('.prob-text').innerText = probPercent + "%";
            bar.style.width = probPercent + "%";

            // CHECK LOGIC: Make sure name matches your Teachable Machine label exactly
            if (name.trim() === "Plastic Waste") {
                if (probPercent >= 70) {
                    bar.style.background = "#ff4757"; // Turn Red
                    isDanger = true;
                } else {
                    bar.style.background = "#2ecc71"; // Stay Green
                }
            } else {
                bar.style.background = "#2ecc71"; // Other bars always Green
            }
        }
        
        alertBox.style.display = isDanger ? "block" : "none";
    }
</script>

</body>
</html>
